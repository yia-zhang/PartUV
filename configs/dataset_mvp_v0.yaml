# MeshUV-TD-PseudoGT-MVP-v0 数据集构建配置(路径相对项目根)
dataset_root: datasets/processed/MeshUV-TD-PseudoGT-MVP-v0
candidate_manifest: datasets/manifests/candidates_mvp_v0.json
teacher_frozen_config: configs/teacher_frozen_v0.yaml

candidate_max: 500
