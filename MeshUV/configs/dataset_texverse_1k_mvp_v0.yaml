# MeshUV-TD-PseudoGT-MVP-v0 正式构建(TexVerse-1K glbs_1k, 单 geometry 单 basecolor)
source: texverse_1k
source_cache: datasets/cache/texverse_1k
dataset_root: datasets/processed/MeshUV-TD-PseudoGT-MVP-v0
teacher_frozen_config: configs/teacher_frozen_v0.yaml

target_accepted: 256
candidate_max: 3000
workers: 4
timeout_s: 900        # calibration/pilot 实测阈值
max_faces: 300000     # preflight 前置拒绝线(超时保护)
seed_sample: 23       # 候选顺序确定性(shard+文件名排序)
# TexVerse 不做 license 获取/筛选; license_id 为可选 provenance 字段
